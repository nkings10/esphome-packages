esphome:
  on_boot:
    priority: 600
    then:
      - switch.turn_on: zRST_gpio
      - delay: 15ms
      - switch.turn_off: zRST_gpio

esp32:
  board: esp32-poe
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/nkings10/esphome-packages
      ref: main
      path: tubezb-cc2652p7-poe-2023/components
    components:
      - stream_server

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO17_OUT
  phy_addr: 0
  power_pin: GPIO12

logger:
  level: DEBUG

api:
  reboot_timeout: 0s

web_server:
  port: 80

script:
  - id: fw_update_mode
    then:
      - switch.turn_on: zBSL
      - delay: 1s
      - switch.turn_on: zRST_gpio
      - delay: 1s
      - switch.turn_off: zRST_gpio
      - logger.log: "Delaying ~10 seconds for cc2652p2 to settle"
      - delay: 11s
      - switch.turn_off: zBSL
      - logger.log: "Please try update with cc2538-bsl tool now"
      - logger.log: "cc-bsl usage: cc2538-bsl.py -p socket://ip-of-gw:6638 -evw firmware.hex"

switch:
  - platform: gpio
    pin: GPIO5
    id: zRST_gpio
    inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO16
    name: Zigbee Module Bootloader Pin
    id: zBSL
    inverted: true
    restore_mode: ALWAYS_OFF
    disabled_by_default: true

button:
  - platform: restart
    name: Restart the Device

  - platform: template
    name: Zigbee Module Reset
    disabled_by_default: true
    id: zRST
    on_press:
      - switch.turn_on: zRST_gpio
      - delay: 15ms
      - switch.turn_off: zRST_gpio

  - platform: template
    name: Trigger Zigbee Module Bootloader
    disabled_by_default: true
    on_press:
      - script.execute: fw_update_mode

uart:
  id: uart_bus
  rx_pin: GPIO36
  tx_pin: GPIO4
  baud_rate: 115200
  rx_buffer_size: 1024

stream_server:
  uart_id: uart_bus
  port: 6638
  buffer_size: 1024

binary_sensor:
  - platform: stream_server
    connected:
      name: TubesZB Serial Connected

mdns:
  services:
    - service: "_tubeszb"
      protocol: "_tcp"
      port: 6638
      txt:
        version: "1.0"
        name: TubesZB
        radio_type: znp
        baud_rate: "115200"
        data_flow_control: software
