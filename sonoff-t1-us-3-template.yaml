# Copy this file into ESPHome for each Sonoff T1 US 3 light switch, then
# replace the example names and secret keys with that device's values.
esphome:
  name: example-ls
  friendly_name: Example LS

api:
  encryption:
    key: !secret example_ls__api_encryption_key

ota:
  - platform: esphome
    password: !secret example_ls__ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Example-LS
    password: !secret example_ls__wifi_ap_password

packages:
  remote_package:
    url: https://github.com/nkings10/esphome-packages
    refresh: 0d
    files:
      - sonoff-t1-us-3.yaml
